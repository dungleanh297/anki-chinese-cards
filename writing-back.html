<!-- Same with the front card expect some tiny changes -->

<div class="card-layout">
    <div id="word-container">

    </div>

    <br />

    <p>{{Pinyin}}</p>

    <p>{{Vietnamese}}</p>

    <div class="hidden">
        {{type:Chinese}}
        <span id="target-hanzi-word">{{Chinese}}</span>
    </div>

    {{tts zh_CN:Chinese}}
</div>

<template id="writing-canvas-template">
    <div class="writing-canvas">

    </div>
</template>

<script>

    var initialize = function () {
        const container = document.getElementById("word-container");
        const targetHanziWord = document.getElementById("target-hanzi-word").innerText;
        const inputAnswerBox = document.querySelector("input#typeans");
        const writingCanvasTemplate = document.getElementById("writing-canvas-template").content.children[0];
        const isDarkMode = document.body.classList.contains("nightMode");

        if (typeof targetHanziWord === "string" && targetHanziWord !== "" && targetHanziWord !== "(Chinese)") {

            const wordLength = targetHanziWord.length;

            for (let i = 0; i < wordLength; ++i) {
                const writingCanvas = writingCanvasTemplate.cloneNode(true);
                container.appendChild(writingCanvas);

                const writer = HanziWriter.create(writingCanvas, targetHanziWord[i], {
                    width: 150,
                    height: 150,
                    showCharacter: false,
                    showHintAfterMisses: false,
                    padding: 0,
                    showOutline: true,
                    hideCharacter: false,
                    delayBetweenStrokes: 500,
                    strokeColor: isDarkMode ? "#FFF" : "#000",
                    drawingColor: isDarkMode ? "#FFF" : "#000",
                    outlineColor: isDarkMode ? "#333" : "#DDD",
                });

                writer.loopCharacterAnimation();

            }
        }
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js" defer="true" onload="initialize();"></script>
